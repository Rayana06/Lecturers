<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Минималистичный Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="goal-section">
        <p>Цель: <mark>знакомство</mark> с инструментами <mark>HTML</mark> и <mark>CSS</mark>.</p>
    </section>
    <button class="theme-toggle" onclick="alert('Функционал JS будет в следующей ЛР!')">Сменить тему</button>
    <div class="calc-container">
        <div id="result" class="result">0</div>

        <div class="buttons-grid">
            <div class="row">
                <button class="my-btn secondary">C</button>
                <button class="my-btn secondary">+/-</button>
                <button class="my-btn secondary">%</button>
                <button class="my-btn primary">/</button>
            </div>
            <div class="row">
                <button class="my-btn">7</button>
                <button class="my-btn">8</button>
                <button class="my-btn">9</button>
                <button class="my-btn primary">×</button>
            </div>
            <div class="row">
                <button class="my-btn">4</button>
                <button class="my-btn">5</button>
                <button class="my-btn">6</button>
                <button class="my-btn primary">-</button>
            </div>
            <div class="row">
                <button class="my-btn">1</button>
                <button class="my-btn">2</button>
                <button class="my-btn">3</button>
                <button class="my-btn primary">+</button>
            </div>
            <div class="row">
                <button class="my-btn digit-zero">0</button>
                <button class="my-btn">.</button>
                <button class="my-btn primary execute">=</button>
            </div>
        </div>
    </div>

    <div class="ui-elements">
        <select>
            <option>Обычный</option>
            <option>Инженерный</option>
        </select>

        <details>
            <summary>Автор работы</summary>
            <p>ФИО: Хашиева Раяная Харомовна | Группа: РТ5-41Б</p>
        </details>

    </div>

    <footer>ЛР выполнила: Хашиева Р.Х.</footer>

</body>
</html>
