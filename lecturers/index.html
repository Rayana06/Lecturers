<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">

    <title>Информационная система преподавателей</title>

    <link rel="icon" href="data:,">

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f3f3;
        }

        .container-app {
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .home-btn,
        .open-btn,
        .delete-btn,
        .model-btn,
        #search-btn,
        #add-btn {

            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 16px;
            color: white;
        }

        .home-btn,
        .open-btn,
        #search-btn,
        #add-btn {

            background: #1677ff;
        }

        .model-btn {
            background: #18a8ff;
        }

        .delete-btn {
            background: #999999;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        #search-input {

            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d9d9d9;
            font-size: 16px;
        }

        .cards-container {

            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card-item {

            width: calc(50% - 10px);

            background: white;

            border-radius: 18px;

            border: 1px solid #d9d9d9;

            padding: 20px;

            box-sizing: border-box;
        }

        .card-top {

            display: flex;

            gap: 20px;

            margin-bottom: 20px;
        }

        .teacher-photo {

            width: 110px;

            height: 110px;

            object-fit: cover;

            border-radius: 14px;
        }

        .card-info h3 {
            margin: 0 0 10px 0;
        }

        .homework-block {

            background: #f7f9fb;

            border-radius: 14px;

            padding: 14px;

            margin-top: 15px;
        }

        .card-buttons {

            display: flex;

            gap: 10px;

            margin-top: 18px;
        }

        .details-card {

            background: white;

            border-radius: 18px;

            padding: 24px;

            border: 1px solid #d9d9d9;
        }

        .details-photo {

            width: 180px;

            height: 180px;

            object-fit: cover;

            border-radius: 18px;

            margin-bottom: 20px;
        }

        .info-row {

            margin-bottom: 12px;

            font-size: 18px;
        }

    </style>
</head>

<body>

    <div id="root" class="container-app"></div>

    <script type="module" src="main.js"></script>

</body>

</html>
