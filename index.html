<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Расписание преподавателей</title>
    <style>
        .card-top {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
            }

            .teacher-photo {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #d9d9d9;
            }

            .card-info h3 {
            margin: 0 0 10px 0;
            }

            .card-info p {
            margin: 0;
            }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f3f3;
        }

        .container-app {
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .home-btn,
        #add-btn,
        .open-btn,
        .delete-btn {
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 16px;
        }

        .home-btn,
        #add-btn,
        .open-btn {
            background: #1677ff;
            color: white;
        }

        .delete-btn {
            background: #a2a2a2;
            color: white;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        #search-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #d9d9d9;
            border-radius: 10px;
            font-size: 16px;
        }

        .card-item {
            background: white;
            border: 1px solid #d9d9d9;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
            max-width: 600px;
        }

        .card-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .day-block {
            background: #ffffff;
            border: 1.5px solid #d9d9d9;
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .day-title {
            text-align: center;
            margin-bottom: 15px;
            color: #333333;
            font-size: 20px;
            font-weight: 700;
        }

        .lesson {
            background: #f1f3f5;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .lesson-time {
            color: #8f8f8f;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .lesson-group {
            color: #006cdc;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .lesson-room {
            color: #222222;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .lesson-type {
            font-size: 16px;
            font-weight: 500;
            margin-top: 6px;
        }

        .lecture {
            color: #1677ff;
        }

        .seminar {
            color: #18a8ff;
        }

        .lab {
            color: #ff8a00;
        }
    </style>
</head>
<body>
    <div id="root" class="container-app"></div>
    <script type="module" src="main.js"></script>
</body>
</html>
